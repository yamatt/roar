name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "main"
    paths:
      - "**.go"
      - "cmd/**"
      - "internal/**"
      - ".github/workflows/test.yml"
      - "go.mod"
      - "go.sum"
      - ".dockerignore"
      - "Dockerfile"
      - "README.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"
      - name: Check formatting
        run: |
          go fmt ./...
      - name: Run go vet
        run: go vet ./...
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"

      - name: Run tests with coverage
        run: go test -v -covermode=atomic -coverprofile=coverage.out ./...

      - name: Output coverage summary
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          total=$(go tool cover -func=coverage.out | awk '/^total:/ { print $3 }')
          {
            echo "### Go coverage"
            echo
            echo "Total coverage: ${total}"
            echo
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.txt
          retention-days: 14

  functional-test-scenarios:
    name: Functional Test Scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        test-name:
          - part1-split
          - pass-through
          - r00-split
          - zip-file
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"

      - name: Build binary
        run: |
          go build -o roar ./cmd/roar
          chmod +x roar

      - name: Install needed dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y fuse3 libfuse3-dev tree
      - name: Run roar for test ${{ matrix.test-name }}
        run: |
          mkdir -p ${{ runner.temp }}/roar-mount/test
          ./roar tests/data/functional-tests/examples/${{ matrix.test-name }} ${{ runner.temp }}/roar-mount/test &
          sleep 1

      - name: Get output for ${{ matrix.test-name }}
        run: |
          cd "$RUNNER_TEMP/roar-mount/test"
          tree . > ${{ runner.temp }}/roar-mount-test-output.txt

      - name: Store results file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: artifact-${{ matrix.test-name }}
          path: ${{ runner.temp }}/roar-mount-test-output.txt
          retention-days: 14

      - name: Verify test ${{ matrix.test-name }} matches expected output
        run: |
          diff tests/data/functional-tests/results/${{ matrix.test-name }}.txt ${{ runner.temp }}/roar-mount-test-output.txt
          
